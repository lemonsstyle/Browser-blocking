<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keyword Filter</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <div class="topBar">
        <div class="sectionHeader mainHeader">
          <h1>屏蔽标题关键词</h1>
          <button type="button" class="infoButton" aria-label="查看关键词过滤说明" aria-expanded="false" data-help="输入要屏蔽的标题词，支持逗号、空格、分号和换行分隔。“全部过滤”是总开关；开启“仅保留命中”后，只显示命中关键词或规则的条目。">i</button>
        </div>
        <div class="sectionHeader templateHeader">
          <button type="button" class="infoButton" aria-label="查看模板说明" aria-expanded="false" data-help="每个模板包含一套过滤设置和适用网站。填写 weibo.com 可匹配其所有子域名；填写完整 URL 可限定到此前缀。多个规则可用逗号或分号分隔；没有适用网站的模板不会执行过滤。">i</button>
          <h2>模板</h2>
        </div>
      </div>
      <section class="templateCard">
        <div class="templateFields">
          <label class="selectField templateField">
            <span>模板</span>
            <select id="templateSelect"></select>
          </label>
          <label class="selectField templateField">
            <span>名称</span>
            <input id="templateName" type="text" maxlength="40">
          </label>
        </div>
        <label class="siteRulesField">
          <span>适用网站 / URL 前缀</span>
          <input id="siteRules" type="text" spellcheck="false" placeholder="例如：weibo.com">
        </label>
        <div class="buttonRow">
          <button id="newTemplate" type="button" class="secondary">新建模板</button>
          <button id="useCurrentSite" type="button" class="secondary">填入当前网站</button>
        </div>
      </section>
      <div class="topControls">
        <label class="toggleRow compactToggle">
          <input id="filterEnabled" type="checkbox" class="toggleBox">
          <span class="toggleSwitch" aria-hidden="true"></span>
          <span class="toggleText">全部过滤</span>
        </label>
        <label class="toggleRow compactToggle">
          <input id="invertMatch" type="checkbox" class="toggleBox">
          <span class="toggleSwitch" aria-hidden="true"></span>
          <span class="toggleText">仅保留命中</span>
        </label>
      </div>
      <textarea id="keywords" spellcheck="false"></textarea>
      <div class="sectionHeader">
        <h2>编号样式过滤</h2>
        <button type="button" class="infoButton" aria-label="查看编号样式过滤说明" aria-expanded="false" data-help="用于识别日本 AV 编号，固定匹配 3–5 位字母、一个连字符和 3–5 位数字，例如 PAD-254、YIUU-762。">i</button>
        <label class="titleToggle">
          <span class="titleToggleText">启用</span>
          <input id="patternEnabled" type="checkbox" class="toggleBox" aria-label="启用编号样式过滤">
          <span class="toggleSwitch" aria-hidden="true"></span>
        </label>
      </div>
      <div class="sectionHeader">
        <h2>相似标题去重</h2>
        <button type="button" class="infoButton" aria-label="查看相似标题去重说明" aria-expanded="false" data-help="保留最先出现的标题，隐藏后续达到重复度阈值的相似标题。滑块越高，过滤越严格。">i</button>
        <label class="titleToggle">
          <span class="titleToggleText">启用</span>
          <input id="dedupeEnabled" type="checkbox" class="toggleBox" aria-label="启用相似标题去重">
          <span class="toggleSwitch" aria-hidden="true"></span>
        </label>
      </div>
      <div class="dedupeCard">
        <div class="rangeField">
          <div class="rangeHeader">
            <span>重复度</span>
            <output id="dedupeThresholdValue" for="dedupeThreshold">80%</output>
          </div>
          <input id="dedupeThreshold" type="range" min="50" max="100" step="1" value="80">
        </div>
      </div>
      <div class="actionRow">
        <button id="showLogs" type="button" class="secondary">屏蔽列表</button>
        <button id="save" type="button">保存并刷新页面</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <div id="helpPopover" class="helpPopover" role="tooltip" hidden></div>
    <dialog id="logsDialog" class="logsDialog" aria-labelledby="logsDialogTitle">
      <div class="dialogHeader">
        <h2 id="logsDialogTitle">屏蔽列表</h2>
        <button id="closeLogs" type="button" class="dialogClose" aria-label="关闭屏蔽列表">×</button>
      </div>
      <textarea id="logs" readonly spellcheck="false"></textarea>
    </dialog>
    <script src="popup.js"></script>
  </body>
</html>
